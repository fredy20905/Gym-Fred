<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>Plan Fredy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f2f2f0;
    color: #111;
    min-height: 100vh;
    color-scheme: light;
  }
  .header {
    background: #fff;
    border-bottom: 1px solid #e8e8e6;
    padding: 18px 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 17px; font-weight: 700; color: #111; letter-spacing: -0.2px; }
  .header p { font-size: 12px; color: #888; margin-top: 2px; }
  .screen { padding: 14px; }
  .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .day-card {
    background: #fff;
    border-radius: 16px;
    border: 1.5px solid #ebebeb;
    padding: 16px 14px 14px;
    cursor: pointer;
  }
  .day-card:active { opacity: 0.7; }
  .day-num {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
    color: #bbb;
  }
  .day-name { font-size: 17px; font-weight: 700; color: #111; }
  .day-muscles { font-size: 11px; color: #888; margin-top: 3px; line-height: 1.4; }
  .day-card.push .day-num { color: #1a6fc4; }
  .day-card.pull .day-num { color: #2e7d32; }
  .day-card.legs .day-num { color: #8e3a6e; }
  .day-card.rest { opacity: 0.55; }
  .session-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .back-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 17px;
    color: #333;
    flex-shrink: 0;
  }
  .session-title { font-size: 15px; font-weight: 700; color: #111; line-height: 1.3; }
  .progress-box {
    background: #fff;
    border-radius: 14px;
    padding: 13px 15px;
    margin-bottom: 10px;
    border: 1px solid #ebebeb;
  }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: #888; }
  .progress-count { font-size: 13px; font-weight: 700; color: #111; }
  .bar-bg { height: 6px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: #2e7d32; border-radius: 4px; transition: width 0.3s ease; }
  .ex-list { display: flex; flex-direction: column; gap: 8px; }
  .ex-item {
    background: #fff;
    border-radius: 14px;
    border: 1.5px solid #ebebeb;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 13px;
    cursor: pointer;
  }
  .ex-item:active { opacity: 0.7; }
  .ex-item.done { background: #f0f7f0; border-color: #81c784; }
  .circle {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid #ccc;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .ex-item.done .circle { background: #2e7d32; border-color: #2e7d32; }
  .check { display: none; color: #fff; font-size: 13px; font-weight: 900; }
  .ex-item.done .check { display: block; }
  .ex-name { font-size: 15px; font-weight: 600; color: #111; line-height: 1.3; }
  .ex-item.done .ex-name { color: #1b5e20; text-decoration: line-through; opacity: 0.7; }
  .ex-sets { font-size: 12px; color: #888; margin-top: 2px; }
  .ex-item.done .ex-sets { color: #388e3c; }
  .cardio-block {
    margin-top: 10px;
    background: #e8f4fd;
    border-radius: 14px;
    border: 1px solid #90caf9;
    padding: 13px 15px;
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .cardio-icon { font-size: 20px; flex-shrink: 0; }
  .cardio-title { font-size: 14px; font-weight: 700; color: #0d47a1; }
  .cardio-sub { font-size: 12px; color: #1565c0; margin-top: 1px; }
  .complete-banner {
    display: none;
    background: #f0f7f0;
    border-radius: 14px;
    border: 1px solid #81c784;
    padding: 20px;
    text-align: center;
    margin-top: 10px;
  }
  .complete-banner.visible { display: block; }
  .complete-banner .trophy { font-size: 38px; margin-bottom: 8px; }
  .complete-banner h3 { font-size: 17px; font-weight: 700; color: #1b5e20; }
  .complete-banner p { font-size: 13px; color: #2e7d32; margin-top: 6px; line-height: 1.5; }
  .reset-btn {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    font-size: 13px;
    color: #888;
    background: #fff;
    border: 1px solid #e8e8e6;
    border-radius: 12px;
    cursor: pointer;
  }
  .rest-view {
    background: #fff;
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    border: 1px solid #ebebeb;
  }
  .rest-view .icon { font-size: 44px; margin-bottom: 12px; }
  .rest-view h2 { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 8px; }
  .rest-view p { font-size: 14px; color: #555; line-height: 1.6; }
  .rest-tips { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .rest-tip {
    background: #f7f7f5;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: #444;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tip-icon { font-size: 18px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="header">
  <h1>Plan Fredy — KS 💪</h1>
  <p id="header-sub">¿Qué vas a trabajar hoy?</p>
</div>

<div class="screen" id="home-screen">
  <div class="day-grid">
    <div class="day-card push" onclick="openDay(1)">
      <div class="day-num">Día 1</div>
      <div class="day-name">Push</div>
      <div class="day-muscles">Pecho · Hombros · Tríceps</div>
    </div>
    <div class="day-card pull" onclick="openDay(2)">
      <div class="day-num">Día 2</div>
      <div class="day-name">Pull</div>
      <div class="day-muscles">Espalda · Bíceps</div>
    </div>
    <div class="day-card legs" onclick="openDay(3)">
      <div class="day-num">Día 3</div>
      <div class="day-name">Legs</div>
      <div class="day-muscles">Piernas · Glúteos · Core</div>
    </div>
    <div class="day-card rest" onclick="openDay(4)">
      <div class="day-num">Día 4</div>
      <div class="day-name">Descanso</div>
      <div class="day-muscles">Movilidad activa</div>
    </div>
    <div class="day-card push" onclick="openDay(5)">
      <div class="day-num">Día 5</div>
      <div class="day-name">Push 2</div>
      <div class="day-muscles">Pecho · Hombros · Tríceps</div>
    </div>
    <div class="day-card pull" onclick="openDay(6)">
      <div class="day-num">Día 6</div>
      <div class="day-name">Pull 2</div>
      <div class="day-muscles">Espalda · Bíceps</div>
    </div>
  </div>
</div>

<div class="screen" id="session-screen" style="display:none;"></div>

<script>
const PLAN = {
  1: {
    title: "Push — pecho, hombros, tríceps",
    cardio: true,
    exercises: [
      { name: "Press de banca con barra", sets: "4 × 6-8 reps" },
      { name: "Press inclinado con mancuernas", sets: "3 × 8-10 reps" },
      { name: "Fondos en paralelas", sets: "3 × 8-12 reps (lastrado si posible)" },
      { name: "Press militar con barra", sets: "4 × 6-8 reps" },
      { name: "Elevaciones laterales", sets: "3 × 12-15 reps" },
      { name: "Extensión de tríceps con cuerda", sets: "3 × 12-15 reps" }
    ]
  },
  2: {
    title: "Pull — espalda, bíceps",
    cardio: true,
    exercises: [
      { name: "Dominadas lastradas o asistidas", sets: "4 × 6-8 reps" },
      { name: "Remo con barra", sets: "4 × 8-10 reps" },
      { name: "Jalón al pecho agarre amplio", sets: "3 × 10-12 reps" },
      { name: "Peso muerto rumano", sets: "3 × 8-10 reps" },
      { name: "Curl con barra EZ", sets: "3 × 10-12 reps" },
      { name: "Curl martillo con mancuernas", sets: "3 × 12-15 reps" }
    ]
  },
  3: {
    title: "Legs — piernas, glúteos, core",
    cardio: true,
    exercises: [
      { name: "Sentadilla con barra", sets: "4 × 6-8 reps" },
      { name: "Prensa de piernas", sets: "3 × 10-12 reps" },
      { name: "Zancadas con mancuernas", sets: "3 × 10-12 reps por pierna" },
      { name: "Curl femoral tumbado", sets: "3 × 12-15 reps" },
      { name: "Elevación de talones (gemelos)", sets: "4 × 15-20 reps" },
      { name: "Plancha abdominal", sets: "3 × 30-40 seg." }
    ]
  },
  4: { rest: true },
  5: {
    title: "Push 2 — pecho, hombros, tríceps",
    cardio: true,
    exercises: [
      { name: "Press inclinado con barra", sets: "4 × 6-8 reps" },
      { name: "Press plano con mancuernas", sets: "3 × 8-10 reps" },
      { name: "Fondos en máquina", sets: "3 × 8-12 reps" },
      { name: "Press Arnold", sets: "4 × 8-10 reps" },
      { name: "Elevaciones frontales", sets: "3 × 12-15 reps" },
      { name: "Press francés con barra", sets: "3 × 12-15 reps" }
    ]
  },
  6: {
    title: "Pull 2 — espalda, bíceps",
    cardio: true,
    exercises: [
      { name: "Dominadas neutras", sets: "4 × 6-8 reps" },
      { name: "Remo en polea baja", sets: "4 × 8-10 reps" },
      { name: "Jalón al pecho agarre neutro", sets: "3 × 10-12 reps" },
      { name: "Peso muerto convencional", sets: "3 × 6-8 reps" },
      { name: "Curl concentrado", sets: "3 × 12-15 reps" },
      { name: "Curl en polea", sets: "3 × 12-15 reps" }
    ]
  }
};

var checked = {};

function openDay(day) {
  if (!checked[day]) checked[day] = {};
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('session-screen').style.display = 'block';
  document.getElementById('header-sub').textContent = 'Sesión activa';
  renderSession(day);
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById('home-screen').style.display = 'block';
  document.getElementById('session-screen').style.display = 'none';
  document.getElementById('header-sub').textContent = '¿Qué vas a trabajar hoy?';
  window.scrollTo(0, 0);
}

function toggleEx(day, idx) {
  checked[day][idx] = !checked[day][idx];
  renderSession(day);
}

function resetDay(day) {
  checked[day] = {};
  renderSession(day);
}

function renderSession(day) {
  var plan = PLAN[day];
  var area = document.getElementById('session-screen');

  if (plan.rest) {
    area.innerHTML = '<div class="session-header"><div class="back-btn" onclick="goHome()">←</div><div class="session-title">Día 4 — descanso y movilidad</div></div><div class="rest-view"><div class="icon">🧘</div><h2>Día de recuperación</h2><p>Tu cuerpo crece cuando descansa.<br>Aprovecha hoy para recuperarte bien.</p><div class="rest-tips"><div class="rest-tip"><span class="tip-icon">🤸</span>Estiramientos generales (10-15 min)</div><div class="rest-tip"><span class="tip-icon">⭕</span>Movilidad articular</div><div class="rest-tip"><span class="tip-icon">🚶</span>Caminata suave</div><div class="rest-tip"><span class="tip-icon">💧</span>Mínimo 4 litros de agua</div><div class="rest-tip"><span class="tip-icon">😴</span>Prioriza el sueño</div></div></div>';
    return;
  }

  var total = plan.exercises.length;
  var done = 0;
  for (var k in checked[day]) { if (checked[day][k]) done++; }
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;
  var allDone = done === total;

  var exItems = '';
  for (var i = 0; i < plan.exercises.length; i++) {
    var ex = plan.exercises[i];
    var isDone = !!checked[day][i];
    exItems += '<div class="ex-item' + (isDone ? ' done' : '') + '" onclick="toggleEx(' + day + ',' + i + ')"><div class="circle"><span class="check">✓</span></div><div class="ex-info"><div class="ex-name">' + ex.name + '</div><div class="ex-sets">' + ex.sets + '</div></div></div>';
  }

  var cardioHtml = plan.cardio ? '<div class="cardio-block"><div class="cardio-icon">🏃</div><div><div class="cardio-title">Cardio post-entreno</div><div class="cardio-sub">25 minutos al finalizar</div></div></div>' : '';
  var bannerHtml = '<div class="complete-banner' + (allDone ? ' visible' : '') + '"><div class="trophy">🏆</div><h3>¡Sesión completada!</h3><p>¡Excelente, Fredy!<br>Recuerda el cardio de 25 min y tu shake post-entreno con creatina.</p></div>';

  area.innerHTML = '<div class="session-header"><div class="back-btn" onclick="goHome()">←</div><div class="session-title">' + plan.title + '</div></div><div class="progress-box"><div class="progress-top"><span class="progress-label">Progreso</span><span class="progress-count">' + done + ' / ' + total + ' ejercicios</span></div><div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%"></div></div></div><div class="ex-list">' + exItems + '</div>' + cardioHtml + bannerHtml + '<button class="reset-btn" onclick="resetDay(' + day + ')">↺ Reiniciar sesión</button>';
}
</script>
</body>
</html>
